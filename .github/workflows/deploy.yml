name: Deploy

on:
    push:
        branches: [main]

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1.2.0
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  script: |
                      cd ~/anjelbuff
                      git pull origin main
                      pnpm install --frozen-lockfile
                      pm2 restart anjelbuff || pm2 start src/bot.ts --name anjelbuff --interpreter
                      pm2 save
